<script>
  
  if (typeof menu2_isMobileLayout === "undefined") {
    
    function menu2_isMobileLayout() {
      return window.innerWidth <= 1024;
    }
  }
  if (typeof menu2_isTouchNav === "undefined") {
    function menu2_isTouchNav() {
      return window.innerWidth <= 1024;
    }
  }
  if (typeof menu2_setBodyScroll === "undefined") {
    function menu2_setBodyScroll(lock) {
      if (!menu2_isMobileLayout()) {
        document.body.style.overflow = "";
        return;
      }
      document.body.style.overflow = lock ? "hidden" : "";
    }
  }
  if (typeof menu2_toggle === "undefined") {
    function menu2_toggle() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var wrapper = root.closest ? root.closest(".h0000") : null;
      var target = wrapper || root;
      if (target.classList.contains("h0000menu-open")) {
        target.classList.remove("h0000menu-open");
        menu2_setBodyScroll(false);
      } else {
        target.classList.add("h0000menu-open");
        menu2_setBodyScroll(true);
        menu2_openActiveBranch();
      }
    }
  }
  if (typeof menu2_closeDrawer === "undefined") {
    function menu2_closeDrawer() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var wrapper = root.closest ? root.closest(".h0000") : null;
      var target = wrapper || root;
      target.classList.remove("h0000menu-open");
      menu2_setBodyScroll(false);
    }
  }
  if (typeof menu2_openActiveBranch === "undefined") {
    function menu2_openActiveBranch() {
      if (!menu2_isMobileLayout()) {
        return;
      }
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var activeWrap = root.querySelector(".h0000menulist-menu.dropdown-content-active-h0000");
      if (activeWrap) {
        activeWrap.classList.add("h0000-dropdown-open");
      }
    }
  }
  if (typeof menu2_setup === "undefined") {
    function menu2_setup() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var dropdownLinks = root.querySelectorAll(".h0000menulist-menu > a");
      for (var i = 0; i < dropdownLinks.length; i++) {
        if (dropdownLinks[i].getAttribute("data-menu2-listener") === "true") {
          continue;
        }
        dropdownLinks[i].setAttribute("data-menu2-listener", "true");
        dropdownLinks[i].addEventListener("click", function(event) {
          if (!menu2_isTouchNav()) {
            return;
          }
          var parent = this.parentNode;
          if (!parent || !parent.querySelector(".dropdown-content-h0000")) {
            return;
          }
          event.preventDefault();
          var menuRoot = parent.parentNode;
          var toggled = parent.classList.contains("h0000-dropdown-open");
          var siblings = menuRoot.querySelectorAll(".h0000menulist-menu");
          for (var j = 0; j < siblings.length; j++) {
            siblings[j].classList.remove("h0000-dropdown-open");
          }
          if (!toggled) {
            parent.classList.add("h0000-dropdown-open");
          }
        });
      }
      var navLinks = root.querySelectorAll(".h0000menulist a[href]");
      for (var k = 0; k < navLinks.length; k++) {
        if (navLinks[k].getAttribute("data-menu2-nav-close") === "true") {
          continue;
        }
        navLinks[k].setAttribute("data-menu2-nav-close", "true");
        navLinks[k].addEventListener("click", function(event) {
          if (!menu2_isMobileLayout()) {
            return;
          }
          if (event.defaultPrevented) {
            return;
          }
          menu2_closeDrawer();
        });
      }
      menu2_openActiveBranch();
    }
    function menu2_resetDropdowns() {
      if (!menu2_isTouchNav()) {
        var root = document.getElementById("menu-2-root");
        if (!root) {
          return;
        }
        var items = root.querySelectorAll(".h0000menulist-menu");
        for (var i = 0; i < items.length; i++) {
          items[i].classList.remove("h0000-dropdown-open");
        }
      }
      if (!menu2_isMobileLayout()) {
        menu2_setBodyScroll(false);
        menu2_closeDrawer();
      }
    }
    setTimeout(menu2_setup, 150);
    window.addEventListener("resize", menu2_resetDropdowns);
  }
</script>
