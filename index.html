<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sad İthalat</title>
  <meta name="description" content="Sad İthalat - Premium ürünlerin ithalat ve ihracatında güvenilir ortağınız. Kalite ve mükemmelliğe olan bağlılığımızla, üstün Alabo ürünleri ile küresel pazarlar arasındaki boşluğu dolduruyoruz." />
  <link rel="canonical" href="https://sad-ithalat.com/" />
  <link rel="alternate" hreflang="tr" href="https://sad-ithalat.com/tr/" />
  <link rel="alternate" hreflang="en" href="https://sad-ithalat.com/en/" />
  <link rel="alternate" hreflang="ar" href="https://sad-ithalat.com/ar/" />
  <link rel="alternate" hreflang="fr" href="https://sad-ithalat.com/fr/" />
  <link rel="alternate" hreflang="x-default" href="https://sad-ithalat.com/tr/" />
  <script>
(function() {
  var available = ["tr","en","ar","fr"];
  var fallbackLang = "en";
  var defaultLang = "tr";
  var settingDefaultLang = "";
  if (settingDefaultLang && available.indexOf(settingDefaultLang) !== -1) {
    location.replace('/' + settingDefaultLang + '/' + (location.search || '') + (location.hash || ''));
    return;
  }
  var browserLangs = [];
  if (navigator.languages && navigator.languages.length) {
    navigator.languages.forEach(function(l) {
      var code = (l.split('-')[0] || '').toLowerCase();
      if (code && browserLangs.indexOf(code) === -1) browserLangs.push(code);
    });
  }
  if (!browserLangs.length && navigator.language) {
    browserLangs.push((navigator.language.split('-')[0] || defaultLang).toLowerCase());
  }
  var chosen = null;
  for (var i = 0; i < browserLangs.length; i++) {
    if (available.indexOf(browserLangs[i]) !== -1) {
      chosen = browserLangs[i];
      break;
    }
  }
  if (chosen === null) {
    chosen = fallbackLang;
  }
  var target = '/' + chosen + '/' + (location.search || '') + (location.hash || '');
  location.replace(target);
})();
  </script>
</head>
<body>
  <p>Sad İthalat</p>
  <noscript><p>Dil seçin: <a href="/tr/">TR</a> | <a href="/en/">EN</a> | <a href="/ar/">AR</a> | <a href="/fr/">FR</a></p></noscript>
</body>
</html>
